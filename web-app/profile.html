<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - TripPilot</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-header {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            display: flex;
            align-items: center;
            gap: 2rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-settings {
            padding: 2rem;
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container" style="padding: 0 1rem; width: 100%;">
            <a href="index.html" class="navbar-brand"><i class="fa-solid fa-plane-up"></i> TripPilot</a>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="my-trips.html" class="sidebar-link"><i class="fa-solid fa-plane"></i> My Trips</a>
                <a href="saved-destinations.html" class="sidebar-link"><i class="fa-solid fa-heart"></i> Saved
                    Destinations</a>
                <a href="budget.html" class="sidebar-link"><i class="fa-solid fa-wallet"></i> Budget Tracker</a>
                <a href="profile.html" class="sidebar-link active"><i class="fa-solid fa-user"></i> Profile Settings</a>
                <a href="#" class="sidebar-link text-danger" id="logout-btn"
                    style="color: var(--accent-color); margin-top: auto;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <h2 class="mb-2">Profile Settings</h2>

            <div class="profile-header">
                <img src="https://ui-avatars.com/api/?name=User&background=7C3AED&color=fff&size=128" alt="Profile"
                    id="profile-img" class="profile-avatar">
                <div>
                    <h3 id="profile-name">User Name</h3>
                    <p class="text-muted" id="profile-email" style="margin-bottom: 0.5rem;">user@example.com</p>
                    <button class="btn btn-outline btn-sm">Change Picture</button>
                </div>
            </div>

            <div class="card-settings">
                <h3 class="mb-1">Personal Details</h3>
                <form onsubmit="event.preventDefault(); alert('Profile updated!');">
                    <div class="d-flex" style="gap: 1.5rem; flex-wrap: wrap;">
                        <div class="form-group" style="flex:1; min-width: 250px;">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="form-name">
                        </div>
                        <div class="form-group" style="flex:1; min-width: 250px;">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="form-email" readonly>
                        </div>
                    </div>
                    <button class="btn btn-primary" type="submit">Save Changes</button>
                </form>
            </div>

            <div class="card-settings">
                <h3 class="mb-1">Travel Preferences</h3>
                <form onsubmit="event.preventDefault(); alert('Preferences updated!');">
                    <div class="form-group">
                        <label class="form-label">Preferred Destinations (e.g. Beaches, Cities, Mountains)</label>
                        <input type="text" class="form-control" value="Cities, Historical Sites">
                    </div>
                    <div class="d-flex" style="gap: 1.5rem; flex-wrap: wrap;">
                        <div class="form-group" style="flex:1; min-width: 250px;">
                            <label class="form-label">Default Travel Style</label>
                            <select class="form-control">
                                <option value="budget">Budget</option>
                                <option value="balanced" selected>Balanced</option>
                                <option value="luxury">Luxury</option>
                                <option value="adventure">Adventure</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex:1; min-width: 250px;">
                            <label class="form-label">Typical Budget Range ($)</label>
                            <select class="form-control">
                                <option value="low">Under $1,000</option>
                                <option value="mid" selected>$1,000 - $3,000</option>
                                <option value="high">Over $3,000</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" type="submit">Update Preferences</button>
                </form>
            </div>

        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            const user = getCurrentUser();
            if (user) {
                document.getElementById('profile-name').textContent = user.name;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('form-name').value = user.name;
                document.getElementById('form-email').value = user.email;
                document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7C3AED&color=fff&size=128`;
            }

            document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); logoutUser(); });
        });
    </script>
</body>

</html>
