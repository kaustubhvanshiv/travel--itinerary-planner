<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Destinations - TripPilot</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dest-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .dest-card {
            border: none;
        }

        .dest-card .card-img-top {
            height: 250px;
        }

        .dest-meta {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .dest-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .popularity {
            color: #A78BFA;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container" style="padding: 0 1rem; width: 100%;">
            <a href="index.html" class="navbar-brand"><i class="fa-solid fa-plane-up"></i> TripPilot</a>
            <div id="user-menu" style="display: flex; gap: 1rem; align-items: center;">
                <span id="user-name-display" class="font-weight-bold"></span>
                <img src="https://ui-avatars.com/api/?name=User&background=7C3AED&color=fff" alt="Avatar"
                    id="user-avatar" style="width: 40px; height: 40px; border-radius: 50%;">
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i>
                    Dashboard</a>
                <a href="my-trips.html" class="sidebar-link"><i class="fa-solid fa-plane"></i> My Trips</a>
                <a href="saved-destinations.html" class="sidebar-link active"><i class="fa-solid fa-heart"></i> Saved
                    Destinations</a>
                <a href="budget.html" class="sidebar-link"><i class="fa-solid fa-wallet"></i> Budget Tracker</a>
                <a href="profile.html" class="sidebar-link"><i class="fa-solid fa-user"></i> Profile Settings</a>
                <a href="#" class="sidebar-link text-danger" id="logout-btn"
                    style="color: var(--accent-color); margin-top: auto;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="section-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Saved Destinations</h2>
                <a href="explore.html" class="btn btn-outline"><i class="fa-solid fa-magnifying-glass"></i> Explore
                    More</a>
            </div>

            <div id="saved-destinations-container" class="dest-grid">
                <!-- JS will populate this -->
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/saved-destinations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            const user = getCurrentUser();
            if (user) {
                document.getElementById('user-name-display').textContent = `Hi, ${user.name.split(' ')[0]}`;
                document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=7C3AED&color=fff`;
            }

            document.getElementById('logout-btn').addEventListener('click', (e) => {
                e.preventDefault();
                logoutUser();
            });
        });
    </script>
</body>

</html>
