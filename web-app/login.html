<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TripPilot</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand"><i class="fa-solid fa-plane-up"></i> TripPilot</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2 class="text-center text-primary mb-1">Welcome Back</h2>
            <p class="text-center text-muted mb-2">Login to manage your trips.</p>

            <div id="alert-box" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group mb-2">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label" style="margin-bottom:0;">Password</label>
                        <a href="#" class="text-primary" style="font-size: 0.85rem;">Forgot Password?</a>
                    </div>
                    <input type="password" id="login-pw" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group d-flex align-items-center gap-2 mb-2">
                    <input type="checkbox" id="remember-me" style="margin-right: 0.5rem;">
                    <label for="remember-me" class="text-muted" style="cursor: pointer;">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="login-button">Login</button>
            </form>

            <p class="text-center mt-2">Don't have an account? <a href="register.html"
                    class="text-primary font-weight-bold">Register here</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pw').value;
            const alertBox = document.getElementById('alert-box');

            const res = loginUser(email, pass);
            if (res.success) {
                alertBox.textContent = 'Login successful! Redirecting...';
                alertBox.className = 'alert alert-success';
                alertBox.style.display = 'block';
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                alertBox.textContent = res.message;
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>

</html>
