<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - TripPilot</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .trip-list-item {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .trip-list-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .trip-image {
            width: 300px;
            height: 100%;
            object-fit: cover;
        }

        .trip-details {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .trip-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .trip-list-item {
                flex-direction: column;
            }

            .trip-image {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container" style="padding: 0 1rem; width: 100%;">
            <a href="index.html" class="navbar-brand"><i class="fa-solid fa-plane-up"></i> TripPilot</a>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="my-trips.html" class="sidebar-link active"><i class="fa-solid fa-plane"></i> My Trips</a>
                <a href="saved-destinations.html" class="sidebar-link"><i class="fa-solid fa-heart"></i> Saved
                    Destinations</a>
                <a href="budget.html" class="sidebar-link"><i class="fa-solid fa-wallet"></i> Budget Tracker</a>
                <a href="profile.html" class="sidebar-link"><i class="fa-solid fa-user"></i> Profile Settings</a>
                <a href="#" class="sidebar-link text-danger" id="logout-btn"
                    style="color: var(--accent-color); margin-top: auto;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h2>My Trips</h2>
                <a href="create-trip.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Trip</a>
            </div>

            <div id="trips-container">
                <!-- populated by js -->
                <div class="text-center py-5" id="empty-state" style="display:none;">
                    <i class="fa-solid fa-suitcase-rolling text-muted mb-1" style="font-size: 3rem;"></i>
                    <h3 class="text-muted">No trips found</h3>
                    <p class="text-muted">You haven't planned any trips yet.</p>
                    <a href="create-trip.html" class="btn btn-primary mt-1">Start Planning</a>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/planner.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            const user = getCurrentUser();

            document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); logoutUser(); });

            const allTrips = getTrips();
            const userTrips = allTrips.filter(t => t.userId === user.id);

            const container = document.getElementById('trips-container');
            const emptyState = document.getElementById('empty-state');

            if (userTrips.length === 0) {
                emptyState.style.display = 'block';
            } else {
                userTrips.sort((a, b) => new Date(b.startDate) - new Date(a.startDate)); // latest first

                userTrips.forEach(trip => {
                    let imgUrl = 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80';
                    if (trip.destination.toLowerCase().includes('paris')) imgUrl = 'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=800&q=80';
                    else if (trip.destination.toLowerCase().includes('japan') || trip.destination.toLowerCase().includes('tokyo')) imgUrl = 'https://images.unsplash.com/photo-1542051812871-34f2cb8d81c5?auto=format&fit=crop&w=800&q=80';

                    const start = new Date(trip.startDate).toLocaleDateString();
                    const end = new Date(trip.endDate).toLocaleDateString();
                    const isPast = new Date(trip.endDate) < new Date();
                    const statusBadge = isPast ? '<span class="budget-tag" style="background:rgba(148,163,184,0.18); color:#CBD5E1;">Completed</span>' : '<span class="budget-tag" style="background:rgba(139,92,246,0.22); color:#E9D5FF;">Upcoming</span>';

                    container.innerHTML += `
            <div class="trip-list-item" id="trip-card-${trip.id}">
              <img src="${imgUrl}" alt="${trip.destination}" class="trip-image">
              <div class="trip-details">
                <div>
                  <div class="d-flex justify-content-between align-items-center mb-1">
                    <h3 style="margin:0;">${trip.tripName}</h3>
                    ${statusBadge}
                  </div>
                  <p class="text-primary font-weight-bold" style="margin-bottom:0.5rem;"><i class="fa-solid fa-location-dot"></i> ${trip.destination}</p>
                  <p class="text-muted" style="margin-bottom:0.5rem;"><i class="fa-regular fa-calendar"></i> ${start} - ${end}</p>
                  <p class="text-muted"><i class="fa-solid fa-user-group"></i> ${trip.travelers} Travelers • <i class="fa-solid fa-money-bill"></i> $${trip.budget}</p>
                </div>
                
                <div class="trip-actions">
                  <a href="itinerary.html?id=${trip.id}" class="btn btn-primary btn-sm">View Itinerary</a>
                  <button class="btn btn-outline btn-sm" onclick="alert('Trip edit mode opened.')"><i class="fa-solid fa-pen"></i></button>
                  <button class="btn btn-outline btn-sm" onclick="alert('Trip duplicated successfully!')"><i class="fa-regular fa-copy"></i></button>
                  <button class="btn btn-outline btn-sm" onclick="alert('Link copied to share!')"><i class="fa-solid fa-share-nodes"></i></button>
                  <button class="btn btn-danger btn-sm" onclick="deleteTrip('${trip.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>
              </div>
            </div>
          `;
                });
            }
        });

        function deleteTrip(tripId) {
            if (confirm('Are you sure you want to delete this trip?')) {
                let allTrips = JSON.parse(localStorage.getItem('tripPilot_trips')) || [];
                allTrips = allTrips.filter(t => t.id !== tripId);
                localStorage.setItem('tripPilot_trips', JSON.stringify(allTrips));
                document.getElementById('trip-card-' + tripId).remove();

                const user = getCurrentUser();
                const userTrips = allTrips.filter(t => t.userId === user.id);
                if (userTrips.length === 0) {
                    document.getElementById('empty-state').style.display = 'block';
                }
            }
        }
    </script>
</body>

</html>
